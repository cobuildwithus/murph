name: Murph Host Support

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # CI must still run apps/web verify, but this workflow does not have the hosted
  # onboarding or hosted device-sync secrets that production deploy surfaces carry.
  # The database/device-sync/contact-privacy values below are deterministic CI-only
  # placeholders that let hosted-web routes boot for build/smoke without wiring the
  # real production control-plane secrets into GitHub Actions.
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:1/murph_test
  DEVICE_SYNC_ENCRYPTION_KEY: 0101010101010101010101010101010101010101010101010101010101010101
  DEVICE_SYNC_ENCRYPTION_KEY_VERSION: v1
  HOSTED_CONTACT_PRIVACY_KEYS: v1:BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ vars.HOSTED_WEB_VERIFY_PRIVY_APP_ID }}
  PRIVY_VERIFICATION_KEY: ci-hosted-web-verification-key

jobs:
  cli-host-matrix:
    name: CLI host matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Prepare built CLI runtime artifacts
        run: pnpm build:test-runtime:prepared

      - name: Run cross-platform CLI coverage
        run: env MURPH_PREPARED_CLI_RUNTIME_ARTIFACTS=1 pnpm exec vitest run packages/cli/test/setup-cli.test.ts packages/cli/test/cli-expansion-inbox-attachments.test.ts packages/cli/test/inbox-service-boundaries.test.ts --no-coverage --maxWorkers 1

  release-checks-linux:
    name: Release checks (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm release:check
