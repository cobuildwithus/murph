name: Murph Host Support

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # CI must still run apps/web verify, but this workflow does not have the hosted
  # onboarding secret set that production deploy surfaces carry. The contact-privacy
  # keyring and verification key are deterministic CI-only placeholders, while the
  # Privy app id comes from a public GitHub Actions variable so the client provider
  # still sees a valid app identifier during dev-smoke and build.
  HOSTED_CONTACT_PRIVACY_KEYS: v1:BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc
  NEXT_PUBLIC_PRIVY_APP_ID: ${{ vars.HOSTED_WEB_VERIFY_PRIVY_APP_ID }}
  PRIVY_VERIFICATION_KEY: ci-hosted-web-verification-key

jobs:
  cli-host-matrix:
    name: CLI host matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run cross-platform CLI coverage
        run: pnpm exec vitest run packages/cli/test/setup-cli.test.ts packages/cli/test/inbox-cli.test.ts --no-coverage --maxWorkers 1

  release-checks-linux:
    name: Release checks (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm release:check
