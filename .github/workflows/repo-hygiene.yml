name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tracked-artifacts:
    name: Tracked private/build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check tracked private/build artifacts
        run: pnpm no-js

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan tracked files for secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --redact --source .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
