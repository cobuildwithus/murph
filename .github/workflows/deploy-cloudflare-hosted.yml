name: Deploy Cloudflare Hosted Execution

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy from
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      deployment_mode:
        description: Use gradual versions/deployments or a direct Wrangler deploy
        required: true
        default: gradual
        type: choice
        options:
          - gradual
          - direct
      gradual_rollout_percentage:
        description: Gradual deployment percentage for the candidate version (0-100)
        required: true
        default: "10"
        type: string
      existing_version_id:
        description: Optional existing Worker version id to deploy instead of uploading a new version
        required: false
        default: ""
        type: string
      sync_worker_secrets:
        description: Include the rendered Worker secrets file during upload or deploy
        required: true
        default: true
        type: boolean
      deploy_worker:
        description: Deploy the Cloudflare Worker after rendering config
        required: true
        default: true
        type: boolean
      smoke_user_id:
        description: Optional hosted user id for a manual /run smoke test
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy hosted execution (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    concurrency:
      group: cloudflare-hosted-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ALLOWED_USER_ENV_KEYS: ${{ vars.CF_ALLOWED_USER_ENV_KEYS }}
      CF_ALLOWED_USER_ENV_PREFIXES: ${{ vars.CF_ALLOWED_USER_ENV_PREFIXES }}
      CF_BUNDLES_BUCKET: ${{ vars.CF_BUNDLES_BUCKET }}
      CF_BUNDLES_PREVIEW_BUCKET: ${{ vars.CF_BUNDLES_PREVIEW_BUCKET }}
      CF_BUNDLE_KEY_ID: ${{ vars.CF_BUNDLE_KEY_ID }}
      CF_COMPATIBILITY_DATE: ${{ vars.CF_COMPATIBILITY_DATE }}
      CF_CONTAINER_INSTANCE_TYPE: ${{ vars.CF_CONTAINER_INSTANCE_TYPE || 'standard-1' }}
      CF_CONTAINER_MAX_INSTANCES: ${{ vars.CF_CONTAINER_MAX_INSTANCES }}
      HOSTED_EXECUTION_CONTAINER_SLEEP_AFTER: ${{ vars.HOSTED_EXECUTION_CONTAINER_SLEEP_AFTER }}
      CF_DEFAULT_ALARM_DELAY_MS: ${{ vars.CF_DEFAULT_ALARM_DELAY_MS }}
      CF_LOG_HEAD_SAMPLING_RATE: ${{ vars.CF_LOG_HEAD_SAMPLING_RATE }}
      CF_MAX_EVENT_ATTEMPTS: ${{ vars.CF_MAX_EVENT_ATTEMPTS }}
      CF_PUBLIC_BASE_URL: ${{ vars.CF_PUBLIC_BASE_URL }}
      CF_RETRY_DELAY_MS: ${{ vars.CF_RETRY_DELAY_MS }}
      CF_RUNNER_COMMIT_TIMEOUT_MS: ${{ vars.CF_RUNNER_COMMIT_TIMEOUT_MS }}
      CF_RUNNER_TIMEOUT_MS: ${{ vars.CF_RUNNER_TIMEOUT_MS }}
      CF_TRACE_HEAD_SAMPLING_RATE: ${{ vars.CF_TRACE_HEAD_SAMPLING_RATE }}
      CF_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
      HOSTED_EXECUTION_BUNDLE_ENCRYPTION_KEY: ${{ secrets.HOSTED_EXECUTION_BUNDLE_ENCRYPTION_KEY }}
      HOSTED_EXECUTION_CONTROL_TOKEN: ${{ secrets.HOSTED_EXECUTION_CONTROL_TOKEN }}
      HOSTED_EXECUTION_INTERNAL_TOKEN: ${{ secrets.HOSTED_EXECUTION_INTERNAL_TOKEN }}
      HOSTED_EXECUTION_RUNNER_CONTROL_TOKEN: ${{ secrets.HOSTED_EXECUTION_RUNNER_CONTROL_TOKEN }}
      HOSTED_EXECUTION_SIGNING_SECRET: ${{ secrets.HOSTED_EXECUTION_SIGNING_SECRET }}
      HOSTED_EMAIL_CLOUDFLARE_ACCOUNT_ID: ${{ vars.HOSTED_EMAIL_CLOUDFLARE_ACCOUNT_ID }}
      HOSTED_EMAIL_CLOUDFLARE_API_BASE_URL: ${{ vars.HOSTED_EMAIL_CLOUDFLARE_API_BASE_URL }}
      HOSTED_EMAIL_CLOUDFLARE_API_TOKEN: ${{ secrets.HOSTED_EMAIL_CLOUDFLARE_API_TOKEN }}
      HOSTED_EMAIL_DEFAULT_SUBJECT: ${{ vars.HOSTED_EMAIL_DEFAULT_SUBJECT }}
      HOSTED_EMAIL_DOMAIN: ${{ vars.HOSTED_EMAIL_DOMAIN }}
      HOSTED_EMAIL_FROM_ADDRESS: ${{ vars.HOSTED_EMAIL_FROM_ADDRESS }}
      HOSTED_EMAIL_LOCAL_PART: ${{ vars.HOSTED_EMAIL_LOCAL_PART }}
      HOSTED_EMAIL_SIGNING_SECRET: ${{ secrets.HOSTED_EMAIL_SIGNING_SECRET }}
      HOSTED_AI_USAGE_BASE_URL: ${{ vars.HOSTED_AI_USAGE_BASE_URL }}
      HOSTED_DEVICE_SYNC_CONTROL_BASE_URL: ${{ vars.HOSTED_DEVICE_SYNC_CONTROL_BASE_URL }}
      HOSTED_SHARE_API_BASE_URL: ${{ vars.HOSTED_SHARE_API_BASE_URL }}
      HOSTED_SHARE_INTERNAL_TOKEN: ${{ secrets.HOSTED_SHARE_INTERNAL_TOKEN }}
      HOSTED_WEB_BASE_URL: ${{ vars.HOSTED_WEB_BASE_URL }}
      DEVICE_SYNC_PUBLIC_BASE_URL: ${{ vars.DEVICE_SYNC_PUBLIC_BASE_URL }}
      DEVICE_SYNC_SECRET: ${{ secrets.DEVICE_SYNC_SECRET }}
      WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
      WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
      OURA_CLIENT_ID: ${{ secrets.OURA_CLIENT_ID }}
      OURA_CLIENT_SECRET: ${{ secrets.OURA_CLIENT_SECRET }}
      LINQ_API_BASE_URL: ${{ vars.LINQ_API_BASE_URL }}
      LINQ_API_TOKEN: ${{ secrets.LINQ_API_TOKEN }}
      LINQ_WEBHOOK_SECRET: ${{ secrets.LINQ_WEBHOOK_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
      TELEGRAM_API_BASE_URL: ${{ vars.TELEGRAM_API_BASE_URL }}
      TELEGRAM_FILE_BASE_URL: ${{ vars.TELEGRAM_FILE_BASE_URL }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      WHISPER_MODEL_PATH: ${{ vars.WHISPER_MODEL_PATH }}
      WHISPER_COMMAND: ${{ vars.WHISPER_COMMAND }}
      FFMPEG_COMMAND: ${{ vars.FFMPEG_COMMAND }}
      MURPH_WEB_FETCH_ENABLED: ${{ vars.MURPH_WEB_FETCH_ENABLED || 'true' }}
      MURPH_WEB_SEARCH_MAX_RESULTS: ${{ vars.MURPH_WEB_SEARCH_MAX_RESULTS }}
      MURPH_WEB_SEARCH_PROVIDER: ${{ vars.MURPH_WEB_SEARCH_PROVIDER }}
      MURPH_WEB_SEARCH_TIMEOUT_MS: ${{ vars.MURPH_WEB_SEARCH_TIMEOUT_MS }}
      PDFTOTEXT_COMMAND: ${{ vars.PDFTOTEXT_COMMAND }}
      HOSTED_EXECUTION_SMOKE_WORKER_BASE_URL: ${{ vars.CF_PUBLIC_BASE_URL }}
      HOSTED_EXECUTION_SMOKE_USER_ID: ${{ inputs.smoke_user_id }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required deploy environment
        env:
          HOSTED_EXECUTION_DEPLOY_WORKER: ${{ inputs.deploy_worker }}
        run: pnpm --dir apps/cloudflare deploy:preflight

      - name: Run focused Cloudflare checks
        run: pnpm --dir apps/cloudflare verify

      - name: Render generated deploy artifacts
        run: |
          pnpm --dir apps/cloudflare deploy:config:render
          pnpm --dir apps/cloudflare deploy:secrets:render

      - name: Show generated artifact paths
        run: ls -lah apps/cloudflare/.deploy

      - name: Roll out Worker
        id: rollout
        if: ${{ inputs.deploy_worker }}
        env:
          HOSTED_EXECUTION_DEPLOYMENT_MODE: ${{ inputs.deployment_mode }}
          HOSTED_EXECUTION_GRADUAL_ROLLOUT_PERCENTAGE: ${{ inputs.gradual_rollout_percentage }}
          HOSTED_EXECUTION_DEPLOY_CONTEXT: ${{ inputs.environment }}
          HOSTED_EXECUTION_DEPLOY_VERSION_ID: ${{ inputs.existing_version_id }}
          HOSTED_EXECUTION_INCLUDE_SECRETS: ${{ inputs.sync_worker_secrets }}
        run: pnpm --dir apps/cloudflare deploy:rollout -- --config ./.deploy/wrangler.generated.jsonc

      - name: Smoke test deployed endpoints
        if: ${{ inputs.deploy_worker }}
        env:
          HOSTED_EXECUTION_SMOKE_VERSION_ID: ${{ steps.rollout.outputs.smoke_version_id }}
        run: pnpm --dir apps/cloudflare deploy:smoke

      - name: Publish deployment summary
        shell: bash
        run: |
          {
            echo "## Cloudflare hosted execution deploy"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Deployment mode: \`${{ inputs.deployment_mode }}\`"
            echo "- Gradual rollout percentage: \`${{ inputs.gradual_rollout_percentage }}\`"
            echo "- Worker name: \`${CF_WORKER_NAME}\`"
            echo "- Worker URL: \`${CF_PUBLIC_BASE_URL:-not-set}\`"
            echo "- Container instance type: \`${CF_CONTAINER_INSTANCE_TYPE}\`"
            echo "- Native container image: Wrangler-built from \`Dockerfile.cloudflare-hosted-runner\` during deploy"
            echo "- Uploaded version id: \`${{ steps.rollout.outputs.uploaded_version_id || 'not-created' }}\`"
            echo "- Candidate version id: \`${{ steps.rollout.outputs.candidate_version_id || 'not-set' }}\`"
            echo "- Final version traffic: \`${{ steps.rollout.outputs.final_version_traffic || 'not-deployed' }}\`"
            echo "- Smoke user id: \`${{ inputs.smoke_user_id || 'not-set' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
