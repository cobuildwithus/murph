name: Publish Murph Packages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Keep the release workflow on the truthful hosted-web verify path. The
  # contact-privacy keyring, public Privy app id, and verification key are
  # deterministic CI-only placeholders so hosted-web smoke/build still boot
  # with the same minimal env contract in every workflow.
  HOSTED_CONTACT_PRIVACY_KEYS: v1:BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc
  NEXT_PUBLIC_PRIVY_APP_ID: cm_app_hosted_web_verify
  PRIVY_VERIFICATION_KEY: ci-hosted-web-verification-key

jobs:
  tag-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag_metadata.outputs.version }}
      npm_tag: ${{ steps.tag_metadata.outputs.npm_tag }}
      is_prerelease: ${{ steps.tag_metadata.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validate release tag format and shared package version
        id: tag_metadata
        shell: bash
        run: |
          set -euo pipefail

          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || {
            echo "Not a tag push."
            exit 1
          }

          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]] || {
            echo "Tag '${GITHUB_REF_NAME}' is not a supported release tag."
            exit 1
          }

          tag_version="${GITHUB_REF_NAME#v}"
          node scripts/verify-release-target.mjs --expect-version "${tag_version}"

          npm_tag=""
          if [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm_tag=""
          elif [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            npm_tag="alpha"
          elif [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            npm_tag="beta"
          elif [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            npm_tag="rc"
          else
            echo "Unsupported version format: ${tag_version}"
            exit 1
          fi

          if [[ "${tag_version}" == *-* ]]; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi

          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

  build:
    needs: tag-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          scope: "@murphai"
          cache: pnpm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        env:
          MURPH_TEST_LANES_PARALLEL: "1"
          MURPH_APP_VERIFY_PARALLEL: "1"
          MURPH_VERIFY_STEP_PARALLEL: "1"
        run: pnpm release:check

      - name: Pack publishable packages
        run: node scripts/pack-publishables.mjs --expect-version "${{ needs.tag-check.outputs.version }}" --clean --out-dir dist/npm --pack-output dist/npm/pack-output.json

      - name: Upload npm package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: npm-tarballs
          path: |
            dist/npm/*.tgz
            dist/npm/pack-output.json

  github-release:
    needs:
      - tag-check
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: npm-tarballs
          path: dist/npm

      - name: Resolve release notes body
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          release_notes_dir="$(node -e 'const fs=require("node:fs"); const manifest=JSON.parse(fs.readFileSync("scripts/release-manifest.json","utf8")); process.stdout.write(manifest.releaseArtifacts.releaseNotesDir);')"
          notes_path="${release_notes_dir}/v${{ needs.tag-check.outputs.version }}.md"
          if [ ! -f "${notes_path}" ]; then
            bash scripts/generate-release-notes.sh "${{ needs.tag-check.outputs.version }}" "${notes_path}"
          fi
          echo "path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.tag-check.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: dist/npm/*.tgz
          prerelease: ${{ needs.tag-check.outputs.is_prerelease == 'true' }}

  publish:
    needs:
      - tag-check
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          scope: "@murphai"

      - name: Update npm
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v7
        with:
          name: npm-tarballs
          path: dist/npm

      - name: Publish tarballs in dependency order
        shell: bash
        run: |
          set -euo pipefail
          publish_args=(
            scripts/publish-publishables.mjs
            --pack-output
            dist/npm/pack-output.json
            --provenance
          )

          if [[ -n "${{ needs.tag-check.outputs.npm_tag }}" ]]; then
            publish_args+=(--npm-tag "${{ needs.tag-check.outputs.npm_tag }}")
          fi

          node "${publish_args[@]}"
