packages:
  - packages/*
  - apps/*
# Keep this list intentionally short. Review new entries with `pnpm deps:approve-builds` on a trusted machine.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
blockExoticSubdeps: true
engineStrict: true
managePackageManagerVersions: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@cobuild/review-gpt@0.5.51'
  - '@cobuild/review-gpt@0.5.52'
  - next@16.2.2
  - '@next/env@16.2.2'
  - '@next/swc-darwin-arm64@16.2.2'
  - '@next/swc-darwin-x64@16.2.2'
  - '@next/swc-linux-arm64-gnu@16.2.2'
  - '@next/swc-linux-arm64-musl@16.2.2'
  - '@next/swc-linux-x64-gnu@16.2.2'
  - '@next/swc-linux-x64-musl@16.2.2'
  - '@next/swc-win32-arm64-msvc@16.2.2'
  - '@next/swc-win32-x64-msvc@16.2.2'
nodeVersion: 24.14.1
packageManagerStrictVersion: true
savePrefix: ''
trustPolicy: no-downgrade
# Ignore provenance-era drift for older releases that predate broad trusted publishing.
trustPolicyIgnoreAfter: 259200
